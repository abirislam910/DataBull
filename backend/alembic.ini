# Alembic configuration. Run migrations from the backend/ directory:
#   cd backend && alembic upgrade head
#
# The database URL is intentionally NOT set here — env.py pulls it from
# app.core.config.Settings so there is a single source of truth for the DSN.

[alembic]
script_location = alembic

# Put the backend/ dir (".") on sys.path so `import app...` resolves in env.py.
prepend_sys_path = .

# Timezone-aware, filename-safe timestamps in generated revision files.
# (revision ids themselves are set explicitly in each migration.)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sqlalchemy.url is deliberately blank; env.py provides it.
sqlalchemy.url =


# --- Logging (consumed by env.py's fileConfig) -----------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
